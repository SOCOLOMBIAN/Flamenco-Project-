<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Peña — Sign Up</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="auth-page">

  <!-- Left panel -->
  <div class="auth-left">
    <div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:40px">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="10" r="5" stroke="#FDF8F0" stroke-width="1.5"/><path d="M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="#FDF8F0" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span style="font-size:20px;font-weight:bold;color:#FDF8F0">La Peña</span>
      </div>
      <h2 style="font-size:24px;color:#FDF8F0;margin-bottom:12px">Join the community</h2>
      <p style="font-size:13px;color:#ddd;line-height:1.8;margin-bottom:24px">La Peña is a verified flamenco community. Only dancers, teachers, enthusiasts and modistas can join.</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;align-items:center;gap:8px"><div style="width:5px;height:5px;border-radius:50%;background:#FDF8F0;opacity:1"></div><span style="font-size:12px;color:#eee">Profile photo required for trust</span></div>
        <div style="display:flex;align-items:center;gap:8px"><div style="width:5px;height:5px;border-radius:50%;background:#FDF8F0;opacity:1"></div><span style="font-size:12px;color:#eee">Agree to community rules</span></div>
        <div style="display:flex;align-items:center;gap:8px"><div style="width:5px;height:5px;border-radius:50%;background:#FDF8F0;opacity:1"></div><span style="font-size:12px;color:#eee">Ratings are mandatory after each exchange</span></div>
      </div>
    </div>
  </div>
